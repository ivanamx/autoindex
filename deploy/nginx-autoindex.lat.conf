# Sitio para autoindex.lat — copia a /etc/nginx/sites-available/ y enlaza en sites-enabled.
# Reemplaza la ruta del proyecto solo si difiere de la de PM2.
#
#   sudo cp deploy/nginx-autoindex.lat.conf /etc/nginx/sites-available/autoindex.lat
#   sudo ln -sf /etc/nginx/sites-available/autoindex.lat /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS (recomendado en producción):
#   sudo certbot --nginx -d autoindex.lat -d www.autoindex.lat

server {
    listen 80;
    listen [::]:80;
    server_name autoindex.lat www.autoindex.lat;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
    }
}
