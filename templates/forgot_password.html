<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablecer contraseña</title>
  <link rel="icon" href="{{ url_for('static', filename='icons/favicon.ico') }}" sizes="any">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

    body {
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: rgba(15, 23, 42, 0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.14);
      padding: 34px 30px 30px;
      border-radius: 20px;
      width: 420px;
      max-width: 100%;
      box-shadow:
        0 8px 32px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.06);
    }

    h2 {
      text-align: center;
      margin-bottom: 10px;
      font-weight: 600;
      font-size: 1.25rem;
      color: #f8fafc;
    }

    .hint {
      text-align: center;
      color: #9ca3af;
      font-size: 0.9rem;
      line-height: 1.5;
      margin-bottom: 18px;
    }

    .input-group { margin-bottom: 14px; }
    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: white;
      outline: none;
      transition: 0.2s;
    }
    input:focus { border-color: #38bdf8; box-shadow: 0 0 0 2px rgba(56,189,248,0.2); }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover { transform: translateY(-1px); box-shadow: 0 10px 25px rgba(56,189,248,0.3); }

    .msg {
      margin-bottom: 14px;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 0.88rem;
      line-height: 1.45;
      border: 1px solid rgba(56, 189, 248, 0.22);
      background: rgba(56, 189, 248, 0.08);
      color: #bae6fd;
    }

    .links {
      margin-top: 14px;
      text-align: center;
      font-size: 0.88rem;
    }
    .links a {
      color: #9ca3af;
      text-decoration: none;
      font-weight: 500;
    }
    .links a:hover { color: #38bdf8; text-decoration: underline; text-underline-offset: 3px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Restablecer contraseña</h2>
    <p class="hint">
      Ingresa tu correo. Si existe una cuenta asociada, te enviaremos un enlace para restablecer tu contraseña.
    </p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="msg">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="input-group">
        <input type="email" name="email" placeholder="Email" required autocomplete="email">
      </div>
      <button type="submit">Enviar enlace</button>
    </form>

    <div class="links">
      <a href="{{ url_for('login') }}">← Volver a iniciar sesión</a>
    </div>
  </div>
</body>
</html>
